<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0c0c0f;
            --surface:   #13131a;
            --border:    #1e1e2e;
            --accent:    #c8a97e;
            --accent-dim:#8a6f4e;
            --text:      #e8e6e1;
            --muted:     #6b6878;
            --error:     #e05c5c;
            --success:   #5cb98c;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .glow {
            position: fixed;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200,169,126,.07) 0%, transparent 70%);
            bottom: -200px; left: -150px;
            pointer-events: none;
            animation: drift 14s ease-in-out infinite alternate;
        }
        @keyframes drift { to { transform: translate(40px, -50px); } }

        /* ── LAYOUT ── */
        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        /* ── LEFT (FORM) ── */
        .panel-left {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
        }

        .form-card {
            width: 100%;
            max-width: 420px;
            animation: fadeUp .5s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .form-card__header {
            margin-bottom: 2.2rem;
        }
        .form-card__header .back-link {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            font-size: .8rem;
            color: var(--muted);
            text-decoration: none;
            margin-bottom: 1.5rem;
            transition: color .2s;
        }
        .form-card__header .back-link:hover { color: var(--accent); }
        .form-card__header .back-link::before { content: '←'; }

        .form-card__header h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.9rem;
            margin-bottom: .4rem;
        }
        .form-card__header p {
            color: var(--muted);
            font-size: .88rem;
        }
        .form-card__header a {
            color: var(--accent);
            text-decoration: none;
        }
        .form-card__header a:hover { text-decoration: underline; }

        /* ── FIELDS ── */
        .field {
            margin-bottom: 1.1rem;
        }
        .field label {
            display: block;
            font-size: .78rem;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: .5rem;
        }
        .field input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: .8rem 1rem;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: .95rem;
            outline: none;
            transition: border-color .2s;
        }
        .field input:focus   { border-color: var(--accent-dim); }
        .field input.invalid { border-color: var(--error); }
        .field input::placeholder { color: var(--muted); }

        .field-hint {
            margin-top: .35rem;
            font-size: .78rem;
            color: var(--muted);
        }

        /* ── STRENGTH BAR ── */
        .strength-bar {
            display: flex;
            gap: 4px;
            margin-top: .5rem;
        }
        .strength-bar span {
            flex: 1;
            height: 3px;
            border-radius: 2px;
            background: var(--border);
            transition: background .3s;
        }
        .strength-bar.s1 span:nth-child(1)              { background: var(--error); }
        .strength-bar.s2 span:nth-child(-n+2)            { background: #e09e5c; }
        .strength-bar.s3 span:nth-child(-n+3)            { background: var(--accent); }
        .strength-bar.s4 span                            { background: var(--success); }

        /* ── SUBMIT ── */
        .btn-submit {
            width: 100%;
            margin-top: 1.6rem;
            padding: .85rem;
            background: var(--accent);
            color: #0c0c0f;
            border: none;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: .95rem;
            font-weight: 500;
            letter-spacing: .03em;
            cursor: pointer;
            transition: opacity .2s, transform .15s;
        }
        .btn-submit:hover   { opacity: .88; }
        .btn-submit:active  { transform: scale(.98); }
        .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

        .btn-submit .spinner {
            display: none;
            width: 16px; height: 16px;
            border: 2px solid rgba(12,12,15,.3);
            border-top-color: #0c0c0f;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-submit.loading .btn-text { display: none; }
        .btn-submit.loading .spinner  { display: block; }

        /* ── ALERT ── */
        .alert {
            display: none;
            margin-top: 1.2rem;
            padding: .75rem 1rem;
            border-radius: 6px;
            font-size: .88rem;
            border-left: 3px solid;
        }
        .alert.error   { background: rgba(224,92,92,.1);  border-color: var(--error);   color: var(--error); }
        .alert.success { background: rgba(92,185,140,.1); border-color: var(--success); color: var(--success); }
        .alert.show    { display: block; animation: fadeUp .25s ease; }

        /* ── RIGHT PANEL (DECO) ── */
        .panel-right {
            border-left: 1px solid var(--border);
            background: linear-gradient(160deg, #0e0e16 0%, #0c0c0f 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: .6rem;
        }
        .brand-dot  { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
        .brand-name {
            font-family: 'DM Serif Display', serif;
            font-size: 1.1rem;
            letter-spacing: .04em;
        }

        .panel-copy { padding: 2rem 0; }
        .panel-copy h1 {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(2.2rem, 4vw, 3.4rem);
            line-height: 1.15;
            margin-bottom: 1.2rem;
        }
        .panel-copy h1 em { font-style: italic; color: var(--accent); }
        .panel-copy p {
            color: var(--muted);
            font-size: .95rem;
            line-height: 1.7;
            max-width: 360px;
        }

        /* ── CHECKLIST ── */
        .checklist {
            list-style: none;
            margin-top: 2rem;
        }
        .checklist li {
            display: flex;
            align-items: center;
            gap: .75rem;
            padding: .6rem 0;
            border-bottom: 1px solid var(--border);
            font-size: .88rem;
            color: var(--muted);
        }
        .checklist li:first-child { border-top: 1px solid var(--border); }
        .checklist li::before {
            content: '✦';
            color: var(--accent);
            font-size: .7rem;
            flex-shrink: 0;
        }

        .panel-footer { font-size: .8rem; color: var(--muted); }

        @media (max-width: 700px) {
            .page { grid-template-columns: 1fr; }
            .panel-right { display: none; }
            .panel-left  { padding: 2rem 1.25rem; }
        }
    </style>
</head>
<body>
<div class="glow"></div>

<div class="page">

    <!-- ═══ LEFT (FORM) ═══ -->
    <div class="panel-left">
        <div class="form-card">

            <div class="form-card__header">
                <a class="back-link" th:href="@{/user/login}">Já tenho conta</a>
                <h2>Criar conta</h2>
                <p>Já possui uma conta? <a th:href="@{/user/login}">Entrar</a></p>
            </div>

            <!-- Mensagens vindas do servidor (Thymeleaf) -->
            <div class="alert error"   th:if="${error}"   th:text="${error}"   style="display:block"></div>
            <div class="alert success" th:if="${success}" th:text="${success}" style="display:block"></div>

            <div class="field">
                <label for="name">Nome completo</label>
                <input id="name" type="text" placeholder="Seu nome" autocomplete="name" required>
            </div>

            <div class="field">
                <label for="email">E-mail</label>
                <input id="email" type="email" placeholder="seu@email.com" autocomplete="email" required>
            </div>

            <div class="field">
                <label for="password">Senha</label>
                <input id="password" type="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required>
                <div class="strength-bar" id="strengthBar">
                    <span></span><span></span><span></span><span></span>
                </div>
                <p class="field-hint" id="strengthLabel">&nbsp;</p>
            </div>

            <div class="field">
                <label for="confirmPassword">Confirmar senha</label>
                <input id="confirmPassword" type="password" placeholder="Repita a senha" autocomplete="new-password" required>
            </div>

            <button class="btn-submit" id="btnRegister">
                <span class="btn-text">Criar conta</span>
                <span class="spinner"></span>
            </button>

            <div class="alert error"   id="alertError"></div>
            <div class="alert success" id="alertSuccess"></div>

        </div>
    </div>

    <!-- ═══ RIGHT (DECO) ═══ -->
    <div class="panel-right">
        <div class="brand">
            <span class="brand-dot"></span>
            <span class="brand-name" th:text="USER-AUTH-API"></span>
        </div>

        <div class="panel-copy">
            <h1>Comece sua<br><em>jornada.</em></h1>
            <p>Crie sua conta gratuitamente e tenha acesso imediato a todos os recursos da plataforma.</p>

            <ul class="checklist">
                <li>Acesso seguro com JWT</li>
                <li>Dados protegidos e criptografados</li>
                <li>Pronto para uso em segundos</li>
            </ul>
        </div>

        <div class="panel-footer"></div>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const API_BASE = 'http://localhost:8080';

    const btn           = document.getElementById('btnRegister');
    const alertError    = document.getElementById('alertError');
    const alertSuccess  = document.getElementById('alertSuccess');
    const passwordInput = document.getElementById('password');
    const confirmInput  = document.getElementById('confirmPassword');
    const strengthBar   = document.getElementById('strengthBar');
    const strengthLabel = document.getElementById('strengthLabel');

    // ── Strength meter ──
    const levels = [
        { cls: '',   label: '' },
        { cls: 's1', label: 'Fraca' },
        { cls: 's2', label: 'Razoável' },
        { cls: 's3', label: 'Boa' },
        { cls: 's4', label: 'Excelente' }
    ];

    function calcStrength(pwd) {
        let score = 0;
        let length = pwd.length;
        if (pwd.length >= 8)             score++;
        if (/[A-Z]/.test(pwd))           score++;
        if (/[0-9]/.test(pwd))           score++;
        if (/[!@#$%&*_+=]/.test(pwd))    score++;
        return {score, length};
    }

    passwordInput.addEventListener('input', () => {
        const pwd   = passwordInput.value;
        const score = pwd.length === 0 ? 0 : calcStrength(pwd).score;
        strengthBar.className = 'strength-bar ' + (pwd ? levels[score].cls : '');
        strengthLabel.textContent = pwd ? levels[score].label : '\u00a0';
    });

    function showAlert(el, msg) {
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 6000);
    }

    btn.addEventListener('click', async () => {
        const name            = document.getElementById('name').value.trim();
        const email           = document.getElementById('email').value.trim();
        const password        = passwordInput.value;
        const confirmPassword = confirmInput.value;

        alertError.classList.remove('show');
        alertSuccess.classList.remove('show');

        if (!name || !email || !password || !confirmPassword) {
            showAlert(alertError, 'Preencha todos os campos.');
            return;
        }

        if (password !== confirmPassword) {
            confirmInput.classList.add('invalid');
            showAlert(alertError, 'As senhas não coincidem.');
            return;
        }
        confirmInput.classList.remove('invalid');

        if (calcStrength(password).score < 2) {
            showAlert(alertError, 'Escolha uma senha mais forte.');
            return;
        }

        if(calcStrength(password).length < 8) {
            showAlert(alertError, 'Escolha uma senha mais forte.');
            return;
        }

        btn.classList.add('loading');
        btn.disabled = true;

        try {
            const response = await fetch(API_BASE + '/auth/register', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ name, email, password })
            });

            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
                throw new Error(data.message || 'Erro ao criar conta. Tente novamente.');
            }

            showAlert(alertSuccess, 'Conta criada com sucesso! Redirecionando para o login…');
            setTimeout(() => {
                window.location.href = '/user/login';
            }, 2000);

        } catch (err) {
            showAlert(alertError, err.message || 'Erro inesperado. Tente novamente.');
        } finally {
            btn.classList.remove('loading');
            btn.disabled = false;
        }
    });

    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') btn.click();
    });
    /*]]>*/
</script>
</body>
</html>
