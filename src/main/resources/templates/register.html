<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/register.css}">
</head>
<body>
<div class="glow"></div>

<div class="page">

    <!-- ═══ LEFT (FORM) ═══ -->
    <div class="panel-left">
        <div class="form-card">

            <div class="form-card__header">
                <a class="back-link" th:href="@{/user/login}">Já tenho conta</a>
                <h2>Criar conta</h2>
                <p>Já possui uma conta? <a th:href="@{/user/login}">Entrar</a></p>
            </div>

            <!-- Mensagens vindas do servidor (Thymeleaf) -->
            <div class="alert error"   th:if="${error}"   th:text="${error}"   style="display:block"></div>
            <div class="alert success" th:if="${success}" th:text="${success}" style="display:block"></div>

            <div class="field">
                <label for="name">Nome completo</label>
                <input id="name" type="text" placeholder="Seu nome" autocomplete="name" required>
            </div>

            <div class="field">
                <label for="email">E-mail</label>
                <input id="email" type="email" placeholder="seu@email.com" autocomplete="email" required>
            </div>

            <div class="field">
                <label for="password">Senha</label>
                <input id="password" type="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required>
                <div class="strength-bar" id="strengthBar">
                    <span></span><span></span><span></span><span></span>
                </div>
                <p class="field-hint" id="strengthLabel">&nbsp;</p>
            </div>

            <div class="field">
                <label for="confirmPassword">Confirmar senha</label>
                <input id="confirmPassword" type="password" placeholder="Repita a senha" autocomplete="new-password" required>
            </div>

            <button class="btn-submit" id="btnRegister">
                <span class="btn-text">Criar conta</span>
                <span class="spinner"></span>
            </button>

            <div class="alert error"   id="alertError"></div>
            <div class="alert success" id="alertSuccess"></div>

        </div>
    </div>

    <!-- ═══ RIGHT (DECO) ═══ -->
    <div class="panel-right">
        <div class="brand">
            <span class="brand-dot"></span>
            <span class="brand-name" th:text="USER-AUTH-API"></span>
        </div>

        <div class="panel-copy">
            <h1>Comece sua<br><em>jornada.</em></h1>
            <p>Crie sua conta gratuitamente e tenha acesso imediato a todos os recursos da plataforma.</p>

            <ul class="checklist">
                <li>Acesso seguro com JWT</li>
                <li>Dados protegidos e criptografados</li>
                <li>Pronto para uso em segundos</li>
            </ul>
        </div>

        <div class="panel-footer"></div>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const API_BASE = 'http://localhost:8080';

    const btn           = document.getElementById('btnRegister');
    const alertError    = document.getElementById('alertError');
    const alertSuccess  = document.getElementById('alertSuccess');
    const passwordInput = document.getElementById('password');
    const confirmInput  = document.getElementById('confirmPassword');
    const strengthBar   = document.getElementById('strengthBar');
    const strengthLabel = document.getElementById('strengthLabel');

    // ── Strength meter ──
    const levels = [
        { cls: '',   label: '' },
        { cls: 's1', label: 'Fraca' },
        { cls: 's2', label: 'Razoável' },
        { cls: 's3', label: 'Boa' },
        { cls: 's4', label: 'Excelente' }
    ];

    function calcStrength(pwd) {
        let score = 0;
        let length = pwd.length;
        if (pwd.length >= 8)             score++;
        if (/[A-Z]/.test(pwd))           score++;
        if (/[0-9]/.test(pwd))           score++;
        if (/[!@#$%&*_+=]/.test(pwd))    score++;
        return {score, length};
    }

    passwordInput.addEventListener('input', () => {
        const pwd   = passwordInput.value;
        const score = pwd.length === 0 ? 0 : calcStrength(pwd).score;
        strengthBar.className = 'strength-bar ' + (pwd ? levels[score].cls : '');
        strengthLabel.textContent = pwd ? levels[score].label : '\u00a0';
    });

    function showAlert(el, msg) {
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 6000);
    }

    btn.addEventListener('click', async () => {
        const name            = document.getElementById('name').value.trim();
        const email           = document.getElementById('email').value.trim();
        const password        = passwordInput.value;
        const confirmPassword = confirmInput.value;

        alertError.classList.remove('show');
        alertSuccess.classList.remove('show');

        if (!name || !email || !password || !confirmPassword) {
            showAlert(alertError, 'Preencha todos os campos.');
            return;
        }

        if (password !== confirmPassword) {
            confirmInput.classList.add('invalid');
            showAlert(alertError, 'As senhas não coincidem.');
            return;
        }
        confirmInput.classList.remove('invalid');

        if (calcStrength(password).score < 2) {
            showAlert(alertError, 'Escolha uma senha mais forte.');
            return;
        }

        if(calcStrength(password).length < 8) {
            showAlert(alertError, 'Escolha uma senha mais forte.');
            return;
        }

        btn.classList.add('loading');
        btn.disabled = true;

        try {
            const response = await fetch(API_BASE + '/auth/register', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ name, email, password })
            });

            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
                throw new Error(data.message || 'Erro ao criar conta. Tente novamente.');
            }

            showAlert(alertSuccess, 'Conta criada com sucesso! Redirecionando para o login…');
            setTimeout(() => {
                window.location.href = '/user/login';
            }, 2000);

        } catch (err) {
            showAlert(alertError, err.message || 'Erro inesperado. Tente novamente.');
        } finally {
            btn.classList.remove('loading');
            btn.disabled = false;
        }
    });

    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') btn.click();
    });
    /*]]>*/
</script>
</body>
</html>
