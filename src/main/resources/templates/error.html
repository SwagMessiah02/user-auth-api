<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/error.css}">
</head>
<body>
<div class="glow"></div>

<div class="page">

    <!-- ═══ LEFT ═══ -->
    <div class="panel-left">
        <div class="brand">
            <span class="brand-dot"></span>
            <span class="brand-name">USER-AUTH-API</span>
        </div>

        <div class="panel-copy">
            <h1>Algo deu<br><em>errado.</em></h1>
            <p>Não se preocupe — o problema pode ser temporário. Tente novamente ou volte para o início.</p>
        </div>

        <div class="panel-footer">
        </div>
    </div>

    <!-- ═══ RIGHT ═══ -->
    <div class="panel-right">
        <div class="error-card">

            <div class="status-code"
                 th:attr="data-code=${status != null ? status : '500'}"
                 th:text="${status != null ? status : '500'}">
                500
            </div>

            <h2 class="error-title"
                th:text="${error != null ? error : 'Erro interno do servidor'}">
                Erro interno do servidor
            </h2>

            <div class="error-message"
                 th:text="${message != null ? message : 'Ocorreu um erro inesperado. Tente novamente mais tarde.'}">
                Ocorreu um erro inesperado. Tente novamente mais tarde.
            </div>

            <div class="error-meta">
                <span>Caminho &nbsp;<strong th:text="${path != null ? path : '-'}">-</strong></span>
                <span>Horário &nbsp;<strong th:text="${timestamp != null ? #dates.format(timestamp, 'dd/MM/yyyy HH:mm:ss') : #dates.format(new java.util.Date(), 'dd/MM/yyyy HH:mm:ss')}">-</strong></span>
            </div>

            <div class="divider"></div>

            <div class="actions">
                <a class="btn btn-ghost" onclick="history.back(); return false;" href="/user/login">← Voltar</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
