<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0c0c0f;
            --surface:   #13131a;
            --border:    #1e1e2e;
            --accent:    #c8a97e;
            --accent-dim:#8a6f4e;
            --text:      #e8e6e1;
            --muted:     #6b6878;
            --error:     #e05c5c;
            --success:   #5cb98c;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
        }

        /* ── GRAIN OVERLAY ── */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* ── AMBIENT GLOW ── */
        .glow {
            position: fixed;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200,169,126,.07) 0%, transparent 70%);
            top: -200px; right: -200px;
            pointer-events: none;
            animation: drift 12s ease-in-out infinite alternate;
        }
        @keyframes drift { to { transform: translate(-40px, 60px); } }

        /* ── LAYOUT ── */
        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        /* ── LEFT PANEL ── */
        .panel-left {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem;
            border-right: 1px solid var(--border);
            background: linear-gradient(160deg, #0e0e16 0%, #0c0c0f 100%);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: .6rem;
        }
        .brand-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent);
        }
        .brand-name {
            font-family: 'DM Serif Display', serif;
            font-size: 1.1rem;
            letter-spacing: .04em;
            color: var(--text);
        }

        .panel-copy {
            padding: 2rem 0;
        }
        .panel-copy h1 {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(2.2rem, 4vw, 3.4rem);
            line-height: 1.15;
            margin-bottom: 1.2rem;
        }
        .panel-copy h1 em {
            font-style: italic;
            color: var(--accent);
        }
        .panel-copy p {
            color: var(--muted);
            font-size: .95rem;
            line-height: 1.7;
            max-width: 360px;
        }

        .panel-footer {
            font-size: .8rem;
            color: var(--muted);
        }

        /* ── DECORATIVE LINES ── */
        .deco-lines {
            position: absolute;
            bottom: 3rem; left: 3rem;
            display: flex; gap: .4rem;
        }
        .deco-lines span {
            display: block;
            height: 40px;
            border-left: 1px solid var(--border);
        }
        .deco-lines span:nth-child(2) { height: 60px; }
        .deco-lines span:nth-child(3) { height: 30px; }

        /* ── RIGHT PANEL (FORM) ── */
        .panel-right {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
        }

        .form-card {
            width: 100%;
            max-width: 400px;
            animation: fadeUp .5s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .form-card__header {
            margin-bottom: 2.5rem;
        }
        .form-card__header h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.9rem;
            margin-bottom: .4rem;
        }
        .form-card__header p {
            color: var(--muted);
            font-size: .88rem;
        }
        .form-card__header a {
            color: var(--accent);
            text-decoration: none;
        }
        .form-card__header a:hover { text-decoration: underline; }

        /* ── FIELDS ── */
        .field {
            margin-bottom: 1.2rem;
        }
        .field label {
            display: block;
            font-size: .78rem;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: .5rem;
        }
        .field input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: .8rem 1rem;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: .95rem;
            outline: none;
            transition: border-color .2s;
        }
        .field input:focus {
            border-color: var(--accent-dim);
        }
        .field input::placeholder { color: var(--muted); }

        /* ── SUBMIT ── */
        .btn-submit {
            width: 100%;
            margin-top: 1.8rem;
            padding: .85rem;
            background: var(--accent);
            color: #0c0c0f;
            border: none;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: .95rem;
            font-weight: 500;
            letter-spacing: .03em;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: opacity .2s, transform .15s;
        }
        .btn-submit:hover  { opacity: .88; }
        .btn-submit:active { transform: scale(.98); }
        .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

        .btn-submit .spinner {
            display: none;
            width: 16px; height: 16px;
            border: 2px solid rgba(12,12,15,.3);
            border-top-color: #0c0c0f;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-submit.loading .btn-text { display: none; }
        .btn-submit.loading .spinner  { display: block; }

        /* ── ALERT ── */
        .alert {
            display: none;
            margin-top: 1.2rem;
            padding: .75rem 1rem;
            border-radius: 6px;
            font-size: .88rem;
            border-left: 3px solid;
        }
        .alert.error   { background: rgba(224,92,92,.1);  border-color: var(--error);   color: var(--error); }
        .alert.success { background: rgba(92,185,140,.1); border-color: var(--success); color: var(--success); }
        .alert.show    { display: block; animation: fadeUp .25s ease; }

        /* ── RESPONSIVE ── */
        @media (max-width: 700px) {
            .page { grid-template-columns: 1fr; }
            .panel-left { display: none; }
            .panel-right { padding: 2rem 1.25rem; }
        }
    </style>
</head>
<body>
<div class="glow"></div>

<div class="page">

    <!-- ═══ LEFT ═══ -->
    <div class="panel-left">
        <div class="brand">
            <span class="brand-dot"></span>
            <span class="brand-name" th:text="USER-AUTH-API">MyApp</span>
        </div>

        <div class="panel-copy">
            <h1>Bem-vindo<br>de <em>volta.</em></h1>
            <p>Acesse sua conta para continuar de onde parou. Segurança e simplicidade em cada detalhe.</p>
        </div>

        <div class="panel-footer">

        </div>

        <div class="deco-lines">
            <span></span><span></span><span></span>
        </div>
    </div>

    <!-- ═══ RIGHT ═══ -->
    <div class="panel-right">
        <div class="form-card">

            <div class="form-card__header">
                <h2>Entrar</h2>
                <p>Não tem uma conta? <a th:href="@{/user/register}">Criar conta</a></p>
            </div>

            <!-- Mensagem de erro vinda do servidor (Thymeleaf) -->
            <div class="alert error" th:if="${error}" th:text="${error}" style="display:block"></div>
            <div class="alert success" th:if="${success}" th:text="${success}" style="display:block"></div>

            <div class="field">
                <label for="email">E-mail</label>
                <input id="email" type="email" placeholder="seu@email.com" autocomplete="email" required>
            </div>

            <div class="field">
                <label for="password">Senha</label>
                <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>

            <button class="btn-submit" id="btnLogin">
                <span class="btn-text">Entrar</span>
                <span class="spinner"></span>
            </button>

            <div class="alert error"   id="alertError"></div>
            <div class="alert success" id="alertSuccess"></div>

        </div>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const API_BASE = 'http://localhost:8080';

    const btn          = document.getElementById('btnLogin');
    const alertError   = document.getElementById('alertError');
    const alertSuccess = document.getElementById('alertSuccess');

    function showAlert(el, msg) {
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 5000);
    }

    btn.addEventListener('click', async () => {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
            showAlert(alertError, 'Preencha todos os campos.');
            return;
        }

        btn.classList.add('loading');
        btn.disabled = true;
        alertError.classList.remove('show');
        alertSuccess.classList.remove('show');

        try {
            const response = await fetch(API_BASE + '/auth/login', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ email, password })
            });

            const data = await response?.json();

            if (!response.ok) {
                throw new Error(data.message || 'Credenciais inválidas. Tente novamente.');
            }

            const token = data.token;
            if (!token) throw new Error('Token não recebido do servidor.');

            await fetch(API_BASE + '/user/protected', {
                method: 'GET',
                headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token}
            })

            showAlert(alertSuccess, 'Login realizado! Redirecionando...');

            window.location.href = '/user/protected'

        } catch (err) {
            showAlert(alertError, err.message || 'Erro inesperado. Tente novamente.');
        } finally {
            btn.classList.remove('loading');
            btn.disabled = false;
        }
    });

    // Permite submeter com Enter
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') btn.click();
    });
    /*]]>*/
</script>
</body>
</html>
