<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/login.css}">
</head>
<body>
<div class="glow"></div>
<div class="page">

    <!-- ═══ LEFT ═══ -->
    <div class="panel-left">
        <div class="brand">
            <span class="brand-dot"></span>
            <span class="brand-name" th:text="USER-AUTH-API">MyApp</span>
        </div>

        <div class="panel-copy">
            <h1>Bem-vindo<br>de <em>volta.</em></h1>
            <p>Acesse sua conta para continuar de onde parou. Segurança e simplicidade em cada detalhe.</p>
        </div>

        <div class="panel-footer">

        </div>

        <div class="deco-lines">
            <span></span><span></span><span></span>
        </div>
    </div>

    <!-- ═══ RIGHT ═══ -->
    <div class="panel-right">
        <div class="form-card">

            <div class="form-card__header">
                <h2>Entrar</h2>
                <p>Não tem uma conta? <a th:href="@{/user/register}">Criar conta</a></p>
            </div>

            <!-- Mensagem de erro vinda do servidor (Thymeleaf) -->
            <div class="alert error" th:if="${error}" th:text="${error}" style="display:block"></div>
            <div class="alert success" th:if="${success}" th:text="${success}" style="display:block"></div>

            <div class="field">
                <label for="email">E-mail</label>
                <input id="email" type="email" placeholder="seu@email.com" autocomplete="email" required>
            </div>

            <div class="field">
                <label for="password">Senha</label>
                <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>

            <button class="btn-submit" id="btnLogin">
                <span class="btn-text">Entrar</span>
                <span class="spinner"></span>
            </button>

            <div class="alert error"   id="alertError"></div>
            <div class="alert success" id="alertSuccess"></div>

        </div>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    // const API_BASE = 'http://localhost:8080';
    const LOGIN_URL    = /*[[@{/auth/login}]]*/ '/auth/login';
    const PROTECTED_URL = /*[[@{/user/protected}]]*/ '/user/protected';

    const btn          = document.getElementById('btnLogin');
    const alertError   = document.getElementById('alertError');
    const alertSuccess = document.getElementById('alertSuccess');

    function showAlert(el, msg) {
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 5000);
    }

    btn.addEventListener('click', async () => {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
            showAlert(alertError, 'Preencha todos os campos.');
            return;
        }

        btn.classList.add('loading');
        btn.disabled = true;
        alertError.classList.remove('show');
        alertSuccess.classList.remove('show');

        try {
            const response = await fetch(LOGIN_URL, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ email, password })
            });

            const data = await response?.json();

            if (!response.ok) {
                throw new Error(data.message || 'Credenciais inválidas. Tente novamente.');
            }

            const token = data.token;
            if (!token) throw new Error('Token não recebido do servidor.');

            // await fetch(API_BASE + '/user/protected', {
            //     method: 'GET',
            //     headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token}
            // })

            showAlert(alertSuccess, 'Login realizado! Redirecionando...');

            window.location.href = PROTECTED_URL;

        } catch (err) {
            showAlert(alertError, err.message || 'Erro inesperado. Tente novamente.');
        } finally {
            btn.classList.remove('loading');
            btn.disabled = false;
        }
    });

    // Permite submeter com Enter
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') btn.click();
    });
    /*]]>*/
</script>
</body>
</html>
